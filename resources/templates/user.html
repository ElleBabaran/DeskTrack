<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeskTrack</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f1f5f9;
    }

    .sidebar {
      background-color: #99A9E0;
      width: 250px;
      transition: width 0.3s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 1rem 0;
    }

    .sidebar.collapsed {
      width: 60px;
    }

    .logo {
      display: flex;
      align-items: center;
      padding-left: 1rem;
      margin-bottom: 2rem;
      transition: opacity 0.3s ease;
    }

    .sidebar.collapsed .logo-text {
      opacity: 0;
      pointer-events: none;
    }

    .logo-img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .logo-text {
      margin-left: 0.75rem;
      font-weight: 700;
      font-size: 1.2rem;
      color: white;
      transition: opacity 0.3s ease;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 1rem;
      cursor: pointer;
      color: white;
      user-select: none;
      transition: background-color 0.2s ease;
    }

    .nav-item:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .nav-icon {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .nav-text {
      margin-left: 1rem;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    .sidebar.collapsed .nav-text {
      opacity: 0;
      visibility: hidden;
      width: 0;
      overflow: hidden;
    }

    .nav-bottom {
      margin-top: auto;
    }

    .arrow-toggle {
      position: absolute;
      bottom: 20px;
      right: -16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background-color: #1e293b;
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    main.main-content-container {
      flex-grow: 1;
      padding: 2rem 3rem;
      overflow-y: auto;
      color: #334155;
    }

    .college-header {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .profile-section {
      display: flex;
      gap: 3rem;
      max-width: 900px;
      flex-wrap: wrap;
    }

    .profile-image-box {
      width: 220px;
      height: 220px;
      background-color: #e2e8f0;
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .profile-image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-details {
      flex: 1 1 400px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .input-group input {
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      border: 1px solid #ddd;
      background-color: white;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .profile-section {
        flex-direction: column;
        align-items: center;
      }

      .profile-image-box {
        width: 140px;
        height: 140px;
      }

      .profile-details {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="logo">
    <img th:src="@{img/logo.png}" alt="DeskTrack Logo" class="logo-img" />
    <span class="logo.PNG">DeskTrack</span>
  </div>
  <div class="nav-item" th:onclick="|location.href='@{/homepage}'|">
    <img th:src="@{img/home.png}" alt="Home" class="nav-icon" />
    <span class="nav-text">Home</span>
  </div>

  <div class="nav-item selected" th:onclick="|location.href='@{/user}'|">
    <img th:src="@{img/user.png}" alt="User Icon" class="nav-icon" />
    <span class="nav-text">User</span>
  </div>
  <div class="nav-item" th:onclick="|location.href='@{/status}'|">
    <img th:src="@{img/status.png}" alt="Status Icon" class="nav-icon" />
    <span class="nav-text">Status</span>
  </div>
  <div class="nav-item" th:onclick="|location.href='@{/dashboard}'|">
    <img th:src="@{img/dashboard.png}" alt="Dashboard Icon" class="nav-icon" />
    <span class="nav-text">Dashboard</span>
  </div>
  <button class="arrow-toggle" id="arrowToggleBtn">⮜</button>
  <div class="nav-item nav-bottom" th:onclick="|location.href='@{/login}'|">
    <img th:src="@{img/logout.png}" alt="Logout Icon" class="nav-icon" />
    <span class="nav-text">Log out</span>
  </div>
</div>

<main class="main-content-container">
  <div>
  <h2 class="college-header">College: CCIT</h2>

  <section class="profile-section">
    <div class="profile-image-box">
      <img th:src="@{img/id.jpg}" alt="Profile Image" />
    </div>
    <div class="profile-details">
      <div class="input-group">
        <label for="nameInput">Name</label>
        <input type="text" id="nameInput" th:value="${fullName}" disabled />
      </div>
      <div class="input-group">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" th:value="${email}" disabled />
      </div>
      <div class="input-group">
        <label for="ID">Program</label>
        <input type="text" id="idInput" th:value="${program}" disabled />
      </div>
    </div>
  </section>

</main>

<script>
  const sidebar = document.getElementById("sidebar");
  const arrowToggleBtn = document.getElementById("arrowToggleBtn");
  arrowToggleBtn.addEventListener("click", () => {
    sidebar.classList.toggle("collapsed");
    arrowToggleBtn.innerHTML = sidebar.classList.contains("collapsed") ? "⮞" : "⮜";
  });
</script>
</body>
</html>
